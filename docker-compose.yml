services:
  postgres:
    image: postgres:16-alpine
    container_name: habilitation-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-habilitation}
      POSTGRES_USER: ${POSTGRES_USER:-habilitation}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-habilitation_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-habilitation}"]
      interval: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: habilitation-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-habilitation}:${POSTGRES_PASSWORD:-habilitation_dev}@postgres:5432/${POSTGRES_DB:-habilitation}
      JWT_SECRET: ${JWT_SECRET}
      FILE_ENCRYPTION_KEY: ${FILE_ENCRYPTION_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      REMINDERS_SECRET: ${REMINDERS_SECRET:-}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      MAIL_FROM: ${MAIL_FROM:-Habilitations 1MDP <habilitations@example.com>}
      MAIL_REPLY_TO: ${MAIL_REPLY_TO:-}
      DOCUSIGN_INTEGRATION_KEY: ${DOCUSIGN_INTEGRATION_KEY:-}
      DOCUSIGN_USER_ID: ${DOCUSIGN_USER_ID:-}
      DOCUSIGN_ACCOUNT_ID: ${DOCUSIGN_ACCOUNT_ID:-}
      DOCUSIGN_PRIVATE_KEY: ${DOCUSIGN_PRIVATE_KEY:-}
      DOCUSIGN_TEMPLATE_ID: ${DOCUSIGN_TEMPLATE_ID:-6da048a0-92a0-458e-a0e8-a2ae33090940}
      DOCUSIGN_ROLE_NAME: ${DOCUSIGN_ROLE_NAME:-Salarie}
      DOCUSIGN_ENV: ${DOCUSIGN_ENV:-production}
      ENV: ${ENV:-dev}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - documents_data:/var/lib/habilitation/documents
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
  documents_data:
